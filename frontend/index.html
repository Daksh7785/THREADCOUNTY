<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ThreadCounty — AI-Powered Fabric Analysis Platform</title>
    <meta name="description" content="ThreadCounty uses AI and computer vision to analyze fabric structures, thread density, and weave patterns from uploaded images. Get instant, accurate textile analysis reports." />
    <meta name="keywords" content="fabric analysis, thread density, AI textile, weave classification, textile inspection, warp weft counter" />
    <meta name="author" content="ThreadCounty Hackathon Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://threadcounty.vercel.app" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://threadcounty.vercel.app" />
    <meta property="og:title" content="ThreadCounty — AI Fabric Analysis" />
    <meta property="og:description" content="Upload a fabric image, get instant thread density analysis, weave classification, and downloadable reports powered by AI." />
    <meta property="og:image" content="https://threadcounty.vercel.app/og-image.png" />
    <meta property="og:site_name" content="ThreadCounty" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@threadcounty" />
    <meta name="twitter:title" content="ThreadCounty — AI Fabric Analysis" />
    <meta name="twitter:description" content="Upload a fabric photo and get instant AI analysis: warp count, weft count, thread density, and expert quality recommendations." />
    <meta name="twitter:image" content="https://threadcounty.vercel.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Google Fonts — Inter (already loaded via CSS but this preconnect speeds it up) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="//localhost:5000" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
